<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>TurboGrid</title>
    <!--inject:start-->
    <script src="../dist/turbogrid.js"></script>
    <!--inject:end-->
    <link href="assets/main.css" rel="stylesheet" />
    <script src="assets/main.js"></script>
    <script src="data/sample-data.js"></script>
    <script src="data/random-data.js"></script>
</head>

<body>
    <div class="header flex-row">
        <select class="st-theme"></select>
    </div>
    <div class="body flex-auto flex-row">
        <div class="main flex-auto flex-column">
            <div class="controller">
                <div>
                    <div class="controller-title">Grid export to JSON data:</div>
                    <select class="st-data">
                        <option>sample-data</option>
                        <option>random-3x10</option>
                        <option>random-100x2k</option>
                    </select>
                </div>
                <div>
                    <button>exportData()</button>
                    <button>exportData({"tg_frozen":true})</button>
                    <button>exportData({"tg_frozen":true,"minWidth":false})</button>
                </div>
                <div>
                    <input type="text" value="" placeholder="keywords" class="ip-keywords" onfocus="this.select()" />
                </div>
            </div>
            <div class="grid-container flex-auto"></div>
        </div>
    </div>
    <script type="text/javascript">
        const Grid = window.turbogrid.Grid;
        const container = document.querySelector('.grid-container');
        const grid = new Grid(container);
        grid.bind('onFirstUpdated', function() {
            console.log('duration:', `${this.renderDuration}ms`);
        });

        let keywords;
        const renderData = function(data) {
            grid.setOption({
                theme: document.querySelector('.st-theme').value,
                selectVisible: true,
                frozenColumn: 0,
                frozenRow: 1,
                rowNotFound: '<div>Not Found</div>',
                rowFilter: function(rowItem) {
                    let hasMatched = grid.highlightKeywordsFilter(rowItem, ['name'], keywords);

                    if (rowItem.tg_frozen) {
                        hasMatched = true;
                    }
                    // filter blank row
                    if (rowItem.formatter === 'blank') {
                        hasMatched = false;
                    }
                    return hasMatched;
                }
            });

            grid.setData(data);
            grid.render();
        };

        function render() {
            const dataStr = document.querySelector('.st-data').value;

            if (dataStr.startsWith('random')) {
                renderData(window.randomData(dataStr));
                return;
            }

            renderData(window.sampleData);
        }

        document.querySelector('.ip-keywords').addEventListener('keyup', function() {
            const k = this.value;
            if (k === keywords) {
                return;
            }
            keywords = k;

            // update rows
            grid.update();
        });

        ['.st-data', '.st-theme'].forEach(function(item) {
            document.querySelector(item).addEventListener('change', function() {
                render();
            });
        });

        window.initCommonEvents(grid);

        window.addEventListener('resize', function() {
            grid.resize();
        });

        window.addEventListener('load', function() {
            render();
        });

    </script>
</body>

</html>
